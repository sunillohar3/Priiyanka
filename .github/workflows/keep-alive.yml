name: Keep backend warm

# Pings the backend so Render's free instance doesn't spin down (which would
# make the first request — and DB-served images — slow after idle).
#
# NOTE ON COST: on a PRIVATE repo this consumes GitHub Actions minutes
# (~1 run/14 min). If that's a concern, disable this workflow and instead use a
# free external monitor like UptimeRobot pinging /api/db-status every 5 minutes.

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 60 "https://priiyanka.onrender.com/api/db-status" || true
